{% extends "base.html" %}
{% block title %}— Login{% endblock %}

{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;">
    <div style="width:100%; max-width:420px;">

        <div style="text-align:center; margin-bottom:2rem;">
            <div style="font-size:2.5rem; margin-bottom:0.5rem;">🔐</div>
            <h1 style="font-size:1.8rem; font-weight:700; color:var(--accent);">
                Secret<span style="color:var(--text);">Shelf</span>
            </h1>
            <p style="color:var(--text-muted); margin-top:0.3rem;">
                Encrypted secrets management
            </p>
        </div>

        <div class="card">
            <div id="alert-box" class="alert"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="your username" autocomplete="off"/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••"/>
            </div>

            <button class="btn btn-primary" id="login-btn"
                    onclick="login()"
                    style="width:100%; justify-content:center; padding:0.75rem;">
                Login
            </button>

            <p style="text-align:center; margin-top:1rem; color:var(--text-muted); font-size:0.9rem;">
                No account?
                <a href="/register" style="color:var(--accent); text-decoration:none;">Register</a>
            </p>
        </div>

        <p style="text-align:center; color:var(--text-muted); font-size:0.75rem; margin-top:1.5rem;">
            All secrets encrypted with AES-256 · JWT Auth · RBAC enforced at DB level
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('login-btn');
        const alertBox = document.getElementById('alert-box');

        if (!username || !password) {
            showAlert('Please enter username and password', 'error');
            return;
        }

        btn.textContent = 'Logging in...';
        btn.disabled    = true;

        try {
            const res = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user',  JSON.stringify(data.user));
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard', 800);
            } else {
                showAlert(data.error || 'Login failed', 'error');
                btn.textContent = 'Login';
                btn.disabled    = false;
            }
        } catch (err) {
            showAlert('Connection error. Is the server running?', 'error');
            btn.textContent = 'Login';
            btn.disabled    = false;
        }
    }

    function showAlert(message, type) {
        const box       = document.getElementById('alert-box');
        box.className   = `alert alert-${type}`;
        box.textContent = message;
        box.style.display = 'block';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
{% endblock %}
